name: master_WayloTechMainPage.yml

on:
# push:
#    branches:
#      - main
#      - master
#    paths:
#      - "src/app/page.tsx"
  workflow_dispatch:

env:
  NODE_VERSION: "24"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone deployment folder
        run: |
          mkdir -p deploy
          cp -rL .next/standalone/. deploy/

          if [ -f "docker-compose.yml" ]; then
            cp docker-compose.yml deploy/
          fi

          if [ -d "public" ]; then
            mkdir -p deploy/public
            cp -rL public/. deploy/public/
          fi

          mkdir -p deploy/.next/static
          cp -rL .next/static/. deploy/.next/static/

      - name: Create deployment zip
        run: |
          cd deploy
          zip -r ../release.zip . -x "**/*.map"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: release.zip
          target: /opt/app/

      - name: Unzip and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
           cd /opt/app
            # Maak de map aan als die niet bestaat
            mkdir -p current
            # Pak de boel uit
            unzip -o release.zip -d current
            rm release.zip
            
            cd current
            
            # Herstart de container
            docker compose up -d --force-recreate
