name: master_WayloTechMainPage.yml

on:
# push:
#    branches:
#      - main
#      - master
#    paths:
#      - "src/app/page.tsx"
    workflow-dispatch:

env:
  AZURE_WEBAPP_NAME: "WayloTechMainPage"
  NODE_VERSION: "24"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone deployment folder
        run: |
          mkdir -p deploy
          # Use -L to dereference symlinks, ensuring a self-contained deployment
          cp -rL .next/standalone/. deploy/
          
          # Copy public and static files, which are not included in standalone output by default
          if [ -d "public" ]; then
            mkdir -p deploy/public
            cp -rL public/. deploy/public/
          fi
          
          mkdir -p deploy/.next/static
          cp -rL .next/static/. deploy/.next/static/

      - name: Create deployment zip
        run: |
          cd deploy
          zip -r ../release.zip . -x "**/*.map"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: release.zip
          startup-command: "HOSTNAME=0.0.0.0 node server.js"